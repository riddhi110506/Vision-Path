<!DOCTYPE html>
<html>
<head>
    <title>Vision Path - Reset Password</title>
    <link rel="stylesheet" href="career-style.css">
</head>

<body>

<div class="container">

    <div class="logo">VISION PATH</div>

    <div class="card">

        <h1>Create New Password</h1>

        <p class="subtitle">
            Enter your Email ID and new password
        </p>

        <input type="email" id="resetEmail" placeholder="Email ID">

        <input type="password" id="newPassword" placeholder="New Password">

        <button onclick="resetPassword()">
            Reset Password
        </button>

        <p class="bottom-text">
            Remember password?
            <a href="career-login.html">Login</a>
        </p>

        <p id="resetMessage"></p>

    </div>

</div>

<script src="career-script.js"></script>

</body>
</html>
