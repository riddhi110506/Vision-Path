<!DOCTYPE html>
<html>
<head>
    <title>Vision Path - Forgot Password</title>
    <link rel="stylesheet" href="career-style.css">
</head>

<body>

<div class="container">

    <div class="logo">VISION PATH</div>

    <div class="card">

        <h1>Forgot Password</h1>

        <p class="subtitle">
            Enter your Email ID. We will send a password reset link.
        </p>

        <input type="email" id="resetEmail" placeholder="Email ID">

        <button onclick="sendResetLink()">
            Send Reset Link
        </button>

        <p class="bottom-text">
            Remember password?
            <a href="career-login.html">Login</a>
        </p>

        <p id="resetMessage"></p>

    </div>

</div>

<script src="career-script.js"></script>

</body>
</html>
