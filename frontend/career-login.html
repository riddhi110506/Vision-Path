<!DOCTYPE html>
<html>
<head>
    <title>Vision Path - Login</title>
    <link rel="stylesheet" href="career-style.css">
</head>

<body>

<div class="container">

    <div class="logo">VISION PATH</div>

    <div class="card">

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Login to continue your journey
        </p>

        <input type="text" id="loginUsername" placeholder="Username">

        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="loginUser()">
            Login
        </button>

        <p class="bottom-text">
            <a href="career-forgot-password.html">
                Forgot Password?
            </a>
        </p>

        <p class="bottom-text">
            Don’t have an account?
            <a href="career-register.html">Sign Up</a>
        </p>

        <p id="loginMessage"></p>

    </div>

</div>

<script src="career-script.js"></script>

</body>
</html>
