<!DOCTYPE html>
<html>
<head>
    <title>Vision Path - Domain Assessment</title>
    <link rel="stylesheet" href="career-style.css">
</head>

<body class="dashboard-body">

<nav class="navbar">
    <h2>VISION PATH</h2>

    <div class="nav-right">
        <span>Capability Assessment</span>

        <button onclick="window.location.href='career-dashboard.html'">
            Back
        </button>
    </div>
</nav>

<div class="dashboard-container">

    <div class="welcome-card">
        <h1>Find Your Suitable Domain 🎯</h1>
        <p>
            Answer these questions based on your capability, thinking style and learning approach.
        </p>
    </div>

    <div class="about-card">

        <h2>Capability-Based Assessment</h2>

        <label>1. When you face a difficult problem, what do you usually do?</label>
        <select id="q1">
            <option value="cyber">Break it into smaller parts and solve it</option>
            <option value="fullstack">Search for examples and learn from them</option>
            <option value="ai">Try different solutions until one works</option>
            <option value="quantum">Analyze deeply before solving</option>
        </select>

        <label>2. Which activity sounds easiest for you?</label>
        <select id="q2">
            <option value="cyber">Finding mistakes in a process</option>
            <option value="fullstack">Building something step-by-step</option>
            <option value="quantum">Solving puzzles and logical questions</option>
            <option value="ai">Organizing and analyzing information</option>
        </select>

        <label>3. If a mobile app stops working, what would you do first?</label>
        <select id="q3">
            <option value="cyber">Find the reason for the issue</option>
            <option value="fullstack">Reinstall or test the app again</option>
            <option value="ai">Search online for solutions</option>
            <option value="quantum">Think logically about what changed</option>
        </select>

        <label>4. What kind of task do you enjoy more?</label>
        <select id="q4">
            <option value="cyber">Finding errors and fixing them</option>
            <option value="fullstack">Creating websites/apps</option>
            <option value="quantum">Solving logical puzzles</option>
            <option value="ai">Organizing information</option>
        </select>

        <label>5. When learning something new, how do you prefer to learn?</label>
        <select id="q5">
            <option value="fullstack">By practicing and doing it myself</option>
            <option value="ai">By watching videos and examples</option>
            <option value="quantum">By reading and understanding concepts</option>
            <option value="cyber">By testing and finding how it works</option>
        </select>

        <label>6. Which activity sounds most interesting?</label>
        <select id="q6">
            <option value="cyber">Finding security weaknesses in a system</option>
            <option value="fullstack">Creating a website or application</option>
            <option value="quantum">Solving advanced mathematical puzzles</option>
            <option value="ai">Teaching a computer to make decisions</option>
        </select>

        <label>7. How do you react when a task becomes difficult?</label>
        <select id="q7">
            <option value="quantum">Keep trying until I solve it</option>
            <option value="cyber">Take a break and investigate again</option>
            <option value="fullstack">Search for help and resources</option>
            <option value="ai">Try another method or tool</option>
        </select>

        <label>8. If given a new technology to learn, what excites you most?</label>
        <select id="q8">
            <option value="cyber">Understanding how it can be secured</option>
            <option value="fullstack">Building projects with it</option>
            <option value="quantum">Learning the science behind it</option>
            <option value="ai">Making it smarter using data</option>
        </select>

        <button onclick="calculateDomain()">
            Analyze My Domain
        </button>

    </div>

</div>

<script src="career-script.js"></script>
</body>
</html>
