<!DOCTYPE html>
<html>
<head>
    <title>Vision Path - Signup</title>
    <link rel="stylesheet" href="career-style.css">
</head>

<body>

<div class="container">

    <div class="logo">VISION PATH</div>

    <div class="card">

        <h1>Create Account</h1>

        <p class="subtitle">
            Start your secure career journey
        </p>

        <input type="email" id="registerEmail" placeholder="Email ID">

        <input type="text" id="registerUsername" placeholder="Username">

        <input type="password" id="registerPassword" placeholder="Password">

        <button onclick="registerUser()">
            Sign Up
        </button>

        <p class="bottom-text">
            Already have an account?
            <a href="career-login.html">Login</a>
        </p>

        <p id="registerMessage"></p>

    </div>

</div>

<script src="career-script.js"></script>

</body>
</html>
